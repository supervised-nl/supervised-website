baseURL = 'https://www.supervised.nl/'
languageCode = 'nl'
title = 'Supervised'
theme = 'supervised'
defaultContentLanguage = 'nl'
enableRobotsTXT = true

# Tags/categorieën worden niet gebruikt: niet genereren, dan ook geen
# lege pagina's in de sitemap.
disableKinds = ['taxonomy', 'term']

# Alleen de blog heeft een feed; geen site-brede RSS op de homepage.
[outputs]
  home = ['html']

[params]
  headline = 'Zorg dat je team Microsoft 365 Copilot echt gebruikt'
  description = 'Supervised helpt MKB-bedrijven in Oost-Nederland om Microsoft 365 Copilot echt in gebruik te krijgen. Van Readiness-scan tot adoptietraject, veilig en meetbaar.'
  email = 'info@supervised.nl'
  phone = '+31644835656'
  # Single source of truth voor het bedrijfsadres (JSON-LD in baseof.html).
  # Moet gelijk zijn aan contact.md en llms.txt.
  streetAddress = 'Rigtersbleek-Zandvoort 10'
  postalCode = '7521 BE'
  city = 'Enschede'
  author = 'Supervised'
  locale = 'nl_NL'
  rss = true

[menu]
  [[menu.main]]
    name = 'Readiness-scan'
    url = '/copilot-readiness-scan/'
    weight = 1
  [[menu.main]]
    name = 'Diensten'
    url = '/diensten/'
    weight = 2
  [[menu.main]]
    name = 'Werkwijze'
    url = '/werkwijze/'
    weight = 3
  [[menu.main]]
    name = 'Kennisbank'
    url = '/kennisbank/'
    weight = 4
  [[menu.main]]
    name = 'Over'
    url = '/over/'
    weight = 5
  [[menu.main]]
    name = 'Contact'
    url = '/contact/'
    weight = 6

[sitemap]
  changefreq = 'monthly'
  priority = 0.5
  filename = 'sitemap.xml'

# De sectie heet intern nog 'blog' (templates keyen op .Section), maar
# publiceert als /kennisbank/. De _index.md heeft een url-override;
# oude /blog/-URL's krijgen een redirect in vercel.json.
[permalinks]
  blog = '/kennisbank/:slug/'
