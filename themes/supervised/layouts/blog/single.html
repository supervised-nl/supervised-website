{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    {{ partial "page-header.html" (dict "eyebrow" "Kennisbank" "title" .Title "lead" .Description) }}
    <p class="page-grid-aside"><span class="small date">{{ .Date | time.Format ":date_long" }}</span><br><a class="small" href="/kennisbank/">← Alle artikelen</a></p>
  </div>
  <div class="page-grid-body">
    {{ .Content }}
  </div>
</div>
{{ with .NextInSection }}
<p><a id="nextlink" href="{{ .RelPermalink }}"><span class="mobile">→</span><span class="desktop">{{ .Title }}</span></a></p>
{{ end }}
{{ end }}
