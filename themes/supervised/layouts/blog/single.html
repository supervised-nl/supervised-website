{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    <div class="page-grid-header">
      <span class="small date">{{ .Date | time.Format ":date_long" }}</span>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page-grid-lead">{{ . }}</p>{{ end }}
    </div>
    <p class="page-grid-aside"><a class="small" href="/blog/">← Alle artikelen</a></p>
  </div>
  <div class="page-grid-body">
    {{ .Content }}
  </div>
</div>
{{ with .NextInSection }}
<p><a id="nextlink" href="{{ .RelPermalink }}"><span class="mobile">→</span><span class="desktop">{{ .Title }}</span></a></p>
{{ end }}
{{ end }}
