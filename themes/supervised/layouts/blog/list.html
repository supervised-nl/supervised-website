{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-header">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="page-grid-lead">{{ . }}</p>{{ end }}
  </div>
  <div class="page-grid-body">
    {{ .Content }}
    <div class="blog-list">
      {{ range .Pages }}
      <article class="blog-item">
        <span class="small blog-meta">{{ .Date | time.Format ":date_long" }}{{ with .ReadingTime }} · {{ . }} min lezen{{ end }}</span>
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        {{ with .Description }}<p>{{ . }}</p>{{ end }}
        <a href="{{ .RelPermalink }}" class="small read-more">Lees verder →</a>
      </article>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
