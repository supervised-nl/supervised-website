{{- /* Page-grid sectie met kop links en tekst rechts.
     dict: title, eyebrow, body (HTML), class (optioneel).
     Het anker-id wordt uit de titel afgeleid. */ -}}
<section id="{{ .title | anchorize }}" class="page-grid{{ with .class }} {{ . }}{{ end }}">
  <div class="page-grid-side">
    {{ partial "page-header.html" (dict "eyebrow" .eyebrow "title" .title "level" "h2") }}
  </div>
  <div class="page-grid-body">
    {{ .body }}
  </div>
</section>
