{{ with .Params.closing }}
<section{{ if .IsHome }} id="contact"{{ end }} class="home-section home-closing">
  <h2>{{ .question }}</h2>
  {{ with .body }}<p>{{ . | markdownify }}</p>{{ end }}
  {{ with .cta }}<a href="{{ .url }}" class="cta cta-primary">{{ .label }} →</a>{{ end }}
</section>
{{ end }}
