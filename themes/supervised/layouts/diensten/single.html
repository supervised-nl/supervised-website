{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    <div class="page-grid-header">
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p class="page-grid-lead">{{ . }}</p>{{ end }}
    </div>
    <p class="page-grid-aside"><a class="small" href="/diensten/">← Alle diensten</a></p>
  </div>
  <div class="page-grid-body">
    {{ .Content }}
  </div>
</div>
{{ end }}
