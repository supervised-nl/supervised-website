{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    {{ partial "page-header.html" (dict "eyebrow" "Veelgestelde vragen" "title" .Title "lead" (.Params.lead | default .Description | markdownify)) }}
  </div>
  <div class="page-grid-body faq-list">
    {{ partial "faq-items.html" (dict "faq" .Params.faq "heading" "h2") }}
    {{ .Content }}
  </div>
</div>
{{ end }}
