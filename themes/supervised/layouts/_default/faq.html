{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    <div class="page-grid-header">
      <span class="home-eyebrow small">Veelgestelde vragen</span>
      <h1>{{ .Title }}</h1>
      {{ with .Params.lead | default .Description }}<p class="page-grid-lead">{{ . | markdownify }}</p>{{ end }}
    </div>
  </div>
  <div class="page-grid-body faq-list">
    {{ partial "faq-items.html" (dict "faq" .Params.faq "heading" "h2") }}
    {{ .Content }}
  </div>
</div>
{{ end }}
