{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    <div class="page-grid-header">
      {{ with .Params.eyebrow }}<span class="home-eyebrow small">{{ . }}</span>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Params.lead | default .Description }}<p class="page-grid-lead">{{ . | markdownify }}</p>{{ end }}
    </div>
  </div>
  <div class="page-grid-body content-sections">
    {{ .Content }}
  </div>
</div>
{{ partial "closing.html" . }}
{{ end }}
