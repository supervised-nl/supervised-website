{{ define "main" }}
<div class="page-grid">
  <div class="page-grid-side">
    {{ partial "page-header.html" (dict "eyebrow" .Params.eyebrow "title" .Title "lead" (.Params.lead | default .Description | markdownify)) }}
  </div>
  <div class="page-grid-body content-sections">
    {{ .Content }}
  </div>
</div>
{{ partial "closing.html" . }}
{{ end }}
